[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions."generate"]
  timeout = 26

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
